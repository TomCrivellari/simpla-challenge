spring.application.name=ai-service

spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8085}

services.finance.url=${FINANCE_SERVICE_URL:http://localhost:8082}
services.meta.url=${META_SERVICE_URL:http://localhost:8083}

security.jwt.secret=${JWT_SECRET:change-me-to-a-secure-256-bit-secret-key-for-local-development}

openai.api-key=${OPENAI_API_KEY:}
openai.api-url=${OPENAI_API_URL:https://api.openai.com/v1/responses}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
