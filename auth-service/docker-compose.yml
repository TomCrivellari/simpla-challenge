services:
  auth-database:
    image: postgres:17-alpine
    container_name: auth-database

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - auth_database_data:/var/lib/postgresql/data

volumes:
  auth_database_data:
