spring.application.name=gateway-service

server.port=${SERVER_PORT:8084}

services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.finance.url=${FINANCE_SERVICE_URL:http://localhost:8082}
services.meta.url=${META_SERVICE_URL:http://localhost:8083}
services.ai.url=${AI_SERVICE_URL:http://localhost:8085}

security.jwt.secret=${JWT_SECRET:change-me-to-a-secure-256-bit-secret-key-for-local-development}

management.endpoints.web.exposure.include=health,info

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/swagger/auth/api-docs
springdoc.swagger-ui.urls[1].name=Finance Service
springdoc.swagger-ui.urls[1].url=/swagger/finance/api-docs
springdoc.swagger-ui.urls[2].name=Meta Service
springdoc.swagger-ui.urls[2].url=/swagger/meta/api-docs
springdoc.swagger-ui.urls[3].name=AI Service
springdoc.swagger-ui.urls[3].url=/swagger/ai/api-docs
