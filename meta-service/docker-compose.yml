services:
  meta-database:
    image: postgres:17-alpine
    container_name: meta-database

    environment:
      POSTGRES_DB: meta_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - meta_database_data:/var/lib/postgresql/data

volumes:
  meta_database_data:
