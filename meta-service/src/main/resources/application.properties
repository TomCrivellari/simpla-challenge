spring.application.name=meta-service

server.port=${SERVER_PORT:8083}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/meta_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

security.jwt.secret=${JWT_SECRET:change-me-to-a-secure-256-bit-secret-key-for-local-development}

services.finance.url=${FINANCE_SERVICE_URL:http://localhost:8082}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
